version: "2"
authtoken: ${NGROK_AUTHTOKEN}

log_level: info
log_format: json
log: /dev/stdout

tunnels:
  mysql:
    proto: tcp
    addr: data_base_ppp:3306
    remote_addr: free
    metadata: MySQL-Database

  minio-api:
    proto: http
    addr: archivos_ppp:9000
    hostname: ${MINIO_SUBDOMAIN:-minio-api}.ngrok-free.app
    inspect: true
    log_level: info

  minio-console:
    proto: http
    addr: archivos_ppp:9001
    hostname: ${MINIO_CONSOLE_SUBDOMAIN:-minio-console}.ngrok-free.app
    inspect: true
    log_level: info

  sonarqube:
    proto: http
    addr: sonarqube:9000
    hostname: ${SONARQUBE_SUBDOMAIN:-sonarqube}.ngrok-free.app
    inspect: false
    log_level: info
    host_header: localhost:9000
