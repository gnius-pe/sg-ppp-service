version: "2"

log_level: info
log_format: json
log: /dev/stdout

tunnels:
  mysql:
    proto: tcp
    addr: data_base_ppp:3306
    metadata: MySQL-Database

  minio-api:
    proto: http
    addr: archivos_ppp:9000
    hostname: minio-api.ngrok-free.app
    inspect: true

  minio-console:
    proto: http
    addr: archivos_ppp:9001
    hostname: minio-console.ngrok-free.app
    inspect: true

  sonarqube:
    proto: http
    addr: sonarqube:9000
    hostname: sonarqube.ngrok-free.app
    inspect: false
    host_header: localhost:9000
